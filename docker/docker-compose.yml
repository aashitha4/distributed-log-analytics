services:
  mongodb:
    image: ${MONGO_IMAGE:-mongo:7}
    container_name: dla-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-log_analytics}
    volumes:
      - mongodb_data:/data/db

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: dla-minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:latest}
    container_name: dla-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-raw-logs};
      exit 0;
      "

  spark-master:
    image: ${SPARK_IMAGE:-spark:3.5.5-scala2.12-java17-python3-r-ubuntu}
    container_name: dla-spark-master
    restart: unless-stopped
    command: >
      /bin/bash -lc "python3 -m pip install --no-cache-dir numpy==1.26.4 >/tmp/pip.log 2>&1 || true;
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master
      --port ${SPARK_MASTER_PORT:-7077}
      --webui-port ${SPARK_MASTER_UI_PORT:-8080}"
    environment:
      - MINIO_ENDPOINT=${SPARK_MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-raw-logs}
      - MONGO_URI=${SPARK_MONGO_URI:-mongodb://mongodb:27017/log_analytics}
      - MONGO_DATABASE=${MONGO_DATABASE:-log_analytics}
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_MASTER_UI_PORT:-8080}:8080"
    volumes:
      - ../spark-jobs:/opt/spark/jobs

  spark-worker-1:
    image: ${SPARK_IMAGE:-spark:3.5.5-scala2.12-java17-python3-r-ubuntu}
    container_name: dla-spark-worker-1
    restart: unless-stopped
    depends_on:
      - spark-master
    command: >
      /bin/bash -lc "python3 -m pip install --no-cache-dir numpy==1.26.4 >/tmp/pip.log 2>&1 || true;
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:${SPARK_MASTER_PORT:-7077}
      --webui-port ${SPARK_WORKER_1_UI_PORT:-8081}
      --cores ${SPARK_WORKER_CORES:-1}
      --memory ${SPARK_WORKER_MEMORY:-2G}"
    environment:
      - MINIO_ENDPOINT=${SPARK_MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-raw-logs}
      - MONGO_URI=${SPARK_MONGO_URI:-mongodb://mongodb:27017/log_analytics}
      - MONGO_DATABASE=${MONGO_DATABASE:-log_analytics}
    ports:
      - "${SPARK_WORKER_1_UI_PORT:-8081}:8081"

  spark-worker-2:
    image: ${SPARK_IMAGE:-spark:3.5.5-scala2.12-java17-python3-r-ubuntu}
    container_name: dla-spark-worker-2
    restart: unless-stopped
    depends_on:
      - spark-master
    command: >
      /bin/bash -lc "python3 -m pip install --no-cache-dir numpy==1.26.4 >/tmp/pip.log 2>&1 || true;
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:${SPARK_MASTER_PORT:-7077}
      --webui-port ${SPARK_WORKER_2_UI_PORT:-8082}
      --cores ${SPARK_WORKER_CORES:-1}
      --memory ${SPARK_WORKER_MEMORY:-2G}"
    environment:
      - MINIO_ENDPOINT=${SPARK_MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-raw-logs}
      - MONGO_URI=${SPARK_MONGO_URI:-mongodb://mongodb:27017/log_analytics}
      - MONGO_DATABASE=${MONGO_DATABASE:-log_analytics}
    ports:
      - "${SPARK_WORKER_2_UI_PORT:-8082}:8082"

volumes:
  mongodb_data:
  minio_data:
